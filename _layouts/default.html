<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
 <head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <title>{{ page.title | default: site.title }}</title>
 <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}?v=2">
</head>
  <body>
    <section class="page-header">
      <h1 class="project-name">{{ site.title | default: 
site.github.repository_name }}</h1>
      <h2 class="project-tagline">{{ site.description | default: 
site.github.project_tagline }}</h2>
    </section>

    <section class="main-content">
      {{ content }}
    </section>
  </body>
</html>
