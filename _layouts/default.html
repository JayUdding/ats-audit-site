<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: 
site.github.build_revision | relative_url }}">
    <title>{{ site.title | default: site.github.repository_name }}</title>
  </head>
  <body>
    <div class="wrapper" style="max-width: 800px; margin: 0 auto; padding: 
20px;">
      
      <!-- Header (Title only, no sidebar) -->
      <header style="text-align: center; margin-bottom: 40px; 
border-bottom: 1px solid #e5e5e5; padding-bottom: 20px;">
        <h1 style="margin: 0; font-size: 32px;"><a href="{{ "/" | 
absolute_url }}" style="text-decoration: none; color: #333;">{{ site.title 
| default: site.github.repository_name }}</a></h1>
        <p style="margin: 10px 0 0 0; color: #666; font-size: 16px;">{{ 
site.description | default: site.github.project_tagline }}</p>
        <p style="margin: 15px 0 0 0;">
          <a href="mailto:githubguru@proton.me" style="color: #267cb9; 
text-decoration: none; font-weight: bold;">Email GitHubGuru</a>
        </p>
      </header>

      <!-- Main Content (Full Width) -->
      <section style="width: 100%; float: none;">
        {{ content }}
      </section>

      <!-- Footer -->
      <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px 
solid #e5e5e5; text-align: center; color: #666; font-size: 14px;">
        <p>This project is maintained by <a href="{{ site.github.owner_url 
}}" style="color: #267cb9;">{{ site.github.owner_name }}</a></p>
        <p>Hosted on GitHub Pages — Theme customized from minimal</p>
      </footer>
      
    </div>
  </body>
</html>
